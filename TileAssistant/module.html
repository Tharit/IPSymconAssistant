<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>
<script src="/icons.js" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f3;
    --surface: #ffffff;
    --surface-alt: #f0eeea;
    --border: rgba(0,0,0,0.1);
    --text: #1a1a18;
    --text-muted: #6b6b68;
    --bubble-user-bg: #1a1a18;
    --bubble-user-text: #f5f5f3;
    --bubble-agent-bg: #ffffff;
    --bubble-agent-text: #1a1a18;
    --bubble-question-bg: #eeedfe;
    --bubble-question-text: #3c3489;
    --input-bg: #ffffff;
    --send-bg: #1a1a18;
    --send-text: #ffffff;
    --send-hover: #333330;
    --radius: 18px;
    --radius-sm: 10px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --surface: #242422;
      --surface-alt: #2c2c2a;
      --border: rgba(255,255,255,0.1);
      --text: #f0eeea;
      --text-muted: #888780;
      --bubble-user-bg: #f0eeea;
      --bubble-user-text: #1a1a18;
      --bubble-agent-bg: #2c2c2a;
      --bubble-agent-text: #f0eeea;
      --bubble-question-bg: #26215c;
      --bubble-question-text: #cecbf6;
      --input-bg: #2c2c2a;
      --send-bg: #f0eeea;
      --send-text: #1a1a18;
      --send-hover: #d3d1c7;
    }
  }

  html {
    height: 100%;
  }

  body {
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 15px;
  }

  #app {
    display: flex;
    flex-direction: column;
    max-width: 800px;
    margin: 0 auto;
    width: 100%;
    /* height set dynamically by JS to account for injected body margins */
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 16px 8px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .bubble-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    animation: fadeUp 0.18s ease both;
  }
  .bubble-row.user { flex-direction: row-reverse; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 500;
    background: var(--surface-alt);
    color: var(--text-muted);
    border: 0.5px solid var(--border);
  }
  .avatar.user-avatar {
    background: var(--bubble-user-bg);
    color: var(--bubble-user-text);
  }

  .bubble {
    padding: 10px 14px;
    line-height: 1.55;
    word-break: break-word;
    white-space: pre-wrap;
    font-size: 14px;
  }

  .bubble.user {
    background: var(--bubble-user-bg);
    color: var(--bubble-user-text);
    border-radius: var(--radius) var(--radius) 4px var(--radius);
  }

  .bubble.assistant {
    background: var(--bubble-agent-bg);
    color: var(--bubble-agent-text);
    border: 0.5px solid var(--border);
    border-radius: var(--radius) var(--radius) var(--radius) 4px;
  }

  .bubble.question {
    background: var(--bubble-question-bg);
    color: var(--bubble-question-text);
    border: 0.5px solid transparent;
  }

  .bubble.error {
    background: #fcebeb;
    color: #a32d2d;
    border: 0.5px solid rgba(163,45,45,0.2);
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-style: italic;
  }
  @media (prefers-color-scheme: dark) {
    .bubble.error { background: #501313; color: #f7c1c1; }
  }

  .question-indicator {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 500;
    margin-bottom: 5px;
    opacity: 0.7;
    color: var(--bubble-question-text);
  }

  /* --- ref chips --- */
  .bubble-col {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-width: min(72%, 560px);
    width: fit-content;
  }
  .bubble-row.user .bubble-col { align-items: flex-end; }

  .ref-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    padding: 0 2px;
  }
  .bubble-row.user .ref-chips { justify-content: flex-end; }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px 4px 8px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: opacity 0.15s, transform 0.1s;
    line-height: 1;
    text-align: left;
  }
  .chip:active { transform: scale(0.95); opacity: 0.75; }

  /* plain reference — subtle outline style */
  .chip.ref {
    background: var(--surface-alt);
    color: var(--text-muted);
    border: 0.5px solid var(--border);
  }
  .chip.ref:hover { background: var(--border); }

  /* action — filled, warmer colour */
  .chip.action {
    background: #fff4e0;
    color: #8a5200;
    border: 0.5px solid rgba(138,82,0,0.2);
  }
  @media (prefers-color-scheme: dark) {
    .chip.action { background: #3a2600; color: #f5c96a; border-color: rgba(245,201,106,0.2); }
  }
  .chip.action:hover { filter: brightness(1.08); }
  /* --- end ref chips --- */

  .typing {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 12px 14px;
    background: var(--bubble-agent-bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius) var(--radius) var(--radius) 4px;
    width: fit-content;
  }
  .typing span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: bounce 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  #input-bar {
    padding: 10px 12px 14px;
    background: var(--bg);
    border-top: 0.5px solid var(--border);
  }

  #input-inner {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    background: var(--input-bg);
    border: 0.5px solid var(--border);
    border-radius: 24px;
    padding: 6px 6px 6px 16px;
    transition: border-color 0.15s;
  }

  #input-inner:focus-within {
    border-color: rgba(0,0,0,0.3);
    box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
  }
  @media (prefers-color-scheme: dark) {
    #input-inner:focus-within {
      border-color: rgba(255,255,255,0.25);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.05);
    }
  }

  #msg-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    font-family: inherit;
    font-size: 16px; /* must be ≥16px — iOS Safari zooms in on focus if smaller */
    color: var(--text);
    line-height: 1.5;
    max-height: 120px;
    overflow-y: auto;
    padding: 4px 0;
    min-height: 24px;
  }
  #msg-input::placeholder { color: var(--text-muted); }

  #send-btn {
    flex-shrink: 0;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: var(--send-bg);
    color: var(--send-text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    transition: background 0.15s, transform 0.1s;
  }
  #send-btn:hover { background: var(--send-hover); }
  #send-btn:active { transform: scale(0.93); }
  #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
</style>
</head>
<body>
<div id="app">
  <div id="messages" role="log" aria-live="polite" aria-label="Chat messages"></div>
  <div id="input-bar">
    <div id="input-inner">
      <textarea id="msg-input" rows="1" placeholder="Type a message…" aria-label="Message input"></textarea>
      <button id="send-btn" aria-label="Send message">
        <i class="fa-light fa-paper-plane" aria-hidden="true"></i>
      </button>
    </div>
  </div>
</div>

<script>
(function () {
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('msg-input');
  const sendBtn = document.getElementById('send-btn');

  let typingEl = null;
  let currentUser = null;

  function guidGenerator() {
   const S4 = function() {
    return (((1+Math.random())*0x10000)|0).toString(16).substring(1);
   };
   return (S4()+S4()+"-"+S4()+"-"+S4()+"-"+S4()+"-"+S4()+S4()+S4());
  }

  const sessionId = 'default';//guidGenerator();

  fetch('/hook/detect_user')
    .then(function (r) { return r.text(); })
    .then(function (id) { 
        currentUser = id.trim();
        if (typeof requestAction === 'function') {
            requestAction('load', JSON.stringify({ session: sessionId, speaker: currentUser }));
        }
    })
    .catch(function () { /* proceed without user id */ });

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function appendMessage(role, text, isQuestion, refs) {
    const row = document.createElement('div');
    row.className = 'bubble-row' + (role === 'user' ? ' user' : '');

    const avatar = document.createElement('div');
    avatar.className = 'avatar' + (role === 'user' ? ' user-avatar' : '');
    avatar.setAttribute('aria-hidden', 'true');
    avatar.innerHTML = role === 'user'
      ? '<i class="fa-light fa-user" style="font-size:12px"></i>'
      : '<i class="fa-light fa-robot" style="font-size:12px"></i>';

    const col = document.createElement('div');
    col.className = 'bubble-col';

    const bubble = document.createElement('div');
    bubble.className = 'bubble ' + role;

    if (role === 'assistant' && isQuestion) {
      bubble.classList.add('question');
      const ind = document.createElement('div');
      ind.className = 'question-indicator';
      ind.innerHTML = '<i class="fa-light fa-circle-question" style="font-size:11px" aria-hidden="true"></i> Question';
      bubble.appendChild(ind);
    }

    bubble.appendChild(document.createTextNode(text));
    col.appendChild(bubble);

    if (refs && refs.length) {
      const chipsRow = document.createElement('div');
      chipsRow.className = 'ref-chips';

      refs.forEach(function (ref) {
        const isAction = !!ref.action;
        const chip = document.createElement('button');
        chip.className = 'chip ' + (isAction ? 'action' : 'ref');
        chip.setAttribute('aria-label', isAction
          ? 'Object ' + ref.id + ': ' + ref.action
          : 'Open object ' + ref.id);

        if (isAction) {
          chip.innerHTML =
            '<i class="fa-light fa-bolt" style="font-size:11px" aria-hidden="true"></i>' +
            '<span>' + ref.name + ' · ' + (ref.value ? ref.value : '') + '</span>';
        } else {
          chip.innerHTML =
            '<i class="fa-light fa-' + (ref.icon ? ref.icon : 'cube') + '" style="font-size:11px" aria-hidden="true"></i>' +
            '<span>' + ref.name + '</span>';
        }

        chip.addEventListener('click', function () {
          if (typeof openObject === 'function') openObject(ref.id);
        });

        chipsRow.appendChild(chip);
      });

      col.appendChild(chipsRow);
    }

    if (role === 'user') {
      row.appendChild(col);
      row.appendChild(avatar);
    } else {
      row.appendChild(avatar);
      row.appendChild(col);
    }

    messagesEl.appendChild(row);
    scrollToBottom();
  }

  function appendError(msg) {
    const row = document.createElement('div');
    row.className = 'bubble-row';
    const bubble = document.createElement('div');
    bubble.className = 'bubble error';
    bubble.textContent = msg || 'Something went wrong. Please try again.';
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollToBottom();
  }

  function showTyping() {
    if (typingEl) return;
    const row = document.createElement('div');
    row.className = 'bubble-row';
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.setAttribute('aria-hidden', 'true');
    avatar.innerHTML = '<i class="fa-light fa-robot" style="font-size:12px"></i>';
    const typing = document.createElement('div');
    typing.className = 'typing';
    typing.setAttribute('aria-label', 'Assistant is typing');
    typing.innerHTML = '<span></span><span></span><span></span>';
    row.appendChild(avatar);
    row.appendChild(typing);
    typingEl = row;
    messagesEl.appendChild(row);
    scrollToBottom();
  }

  function hideTyping() {
    if (typingEl) {
      typingEl.remove();
      typingEl = null;
    }
  }

  function handleMessage(data) {
    let parsed;
    try {
      parsed = typeof data === 'string' ? JSON.parse(data) : data;
    } catch (e) {
      appendError('Received malformed response.');
      return;
    }
    if(Array.isArray(parsed)) {
      parsed.forEach(handleMessage);
      return;
    }
    hideTyping();
    if(parsed.role.startsWith('user')) {
        showTyping();
    }
    if (!parsed.success) {
      appendError('The assistant encountered an error.');
      return;
    }
    if(!parsed.session || parsed.session !== sessionId) {
      // Ignore messages from other sessions
      return;
    }
    appendMessage(parsed.role.split(':')[0], parsed.text, parsed.question === true, parsed.refs || []);
  }

  function submit() {
    const text = inputEl.value.trim();
    if (!text) return;
    //appendMessage('user', text, false, []);
    inputEl.value = '';
    inputEl.style.height = 'auto';
    showTyping();
    if (typeof requestAction === 'function') {
      requestAction('message', JSON.stringify({ text: text, session: sessionId, speaker: currentUser }));
    }
  }

  sendBtn.addEventListener('click', submit);

  inputEl.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      submit();
    }
  });

  inputEl.addEventListener('input', function () {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  window.handleMessage = handleMessage;

  function fitApp() {
    const s = window.getComputedStyle(document.body);
    const mt = parseFloat(s.marginTop)    || 0;
    const mb = parseFloat(s.marginBottom) || 0;
    document.getElementById('app').style.height = (window.innerHeight - mt - mb) + 'px';
  }

  fitApp();
  window.addEventListener('resize', fitApp);
  new MutationObserver(fitApp).observe(document.body, { attributes: true, attributeFilter: ['style'] });
})();
</script>
</body>
</html>
